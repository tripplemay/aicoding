name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-workbench/package-lock.json
      - name: Verify build
        working-directory: ai-workbench
        env:
          DATABASE_URL: file:./dev.db
          AUTH_SECRET: dummy-secret-for-build
          NEXTAUTH_URL: http://localhost:3000
          OPENROUTER_API_KEY: dummy
        run: |
          npm ci
          npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          python3 -c "
          import os, stat
          key = os.environ['SSH_KEY']
          lines = key.split('\n')
          print(f'[debug] line count: {len(lines)}, total chars: {len(key)}')
          print(f'[debug] first 30 chars: {repr(key[:30])}')
          # Rebuild key with proper newlines if stored as single line
          if len(lines) < 5:
              key = key.replace(' ', '\n')
          key = key.strip() + '\n'
          path = os.path.expanduser('~/.ssh/deploy_key')
          open(path, 'w').write(key)
          os.chmod(path, 0o600)
          print(f'[debug] wrote {len(key.splitlines())} lines to key file')
          "
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "cd $VPS_DEPLOY_PATH && git pull origin main && cd ai-workbench && docker compose down && docker compose up --build -d && docker system prune -f"
