name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-workbench/package-lock.json
      - name: Verify build
        working-directory: ai-workbench
        env:
          DATABASE_URL: file:./dev.db
          AUTH_SECRET: dummy-secret-for-build
          NEXTAUTH_URL: http://localhost:3000
          OPENROUTER_API_KEY: dummy
        run: |
          npm ci
          npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "
            cd $VPS_DEPLOY_PATH &&
            git pull origin main &&
            cd ai-workbench &&
            docker compose down &&
            docker compose up --build -d &&
            docker system prune -f
          "
