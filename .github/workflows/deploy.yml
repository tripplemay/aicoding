name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-workbench/package-lock.json
      - name: Verify build
        working-directory: ai-workbench
        env:
          DATABASE_URL: file:./dev.db
          AUTH_SECRET: dummy-secret-for-build
          NEXTAUTH_URL: http://localhost:3000
          OPENROUTER_API_KEY: dummy
        run: |
          npm ci
          npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/deploy_key << 'SSHEOF'
          ${{ secrets.VPS_SSH_KEY }}
          SSHEOF
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_DEPLOY_PATH }} && git pull origin main && cd ai-workbench && docker compose down && docker compose up --build -d && docker system prune -f"
