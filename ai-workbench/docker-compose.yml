services:
  app:
    build: .
    env_file: .env.production
    environment:
      DATABASE_URL: file:/data/app.db
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - internal

volumes:
  sqlite_data:

networks:
  internal:
    driver: bridge
